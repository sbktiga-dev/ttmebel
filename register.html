<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация — ТТмебель</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=3.1">
  <style>
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .auth-card {
      background: rgba(37,37,37,0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(58,58,58,0.5);
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 25px 80px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
    }
    .auth-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }
    .auth-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .auth-logo .logo-mark {
      width: 56px;
      height: 56px;
      font-size: 1.6rem;
    }
    .auth-title {
      text-align: center;
      margin-bottom: 8px;
      font-size: 1.6rem;
      font-weight: 800;
    }
    .auth-subtitle {
      text-align: center;
      color: var(--text-light);
      margin-bottom: 32px;
      font-size: 0.95rem;
    }
    .auth-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 32px;
      border-radius: 10px;
      overflow: hidden;
      border: 2px solid rgba(58,58,58,0.5);
    }
    .auth-tab {
      flex: 1;
      padding: 12px;
      background: transparent;
      border: none;
      color: var(--text-light);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
    }
    .auth-tab.active {
      background: var(--accent);
      color: var(--primary-dark);
    }
    .auth-tab:hover:not(.active) {
      background: rgba(139,111,175,0.1);
      color: var(--text);
    }
    .auth-form {
      display: none;
    }
    .auth-form.active {
      display: block;
      animation: fadeInUp 0.3s ease;
    }
    .auth-card .form-group {
      margin-bottom: 20px;
    }
    .auth-card .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 0.9rem;
      color: var(--text);
    }
    .auth-card input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid rgba(58,58,58,0.5);
      border-radius: 10px;
      font-size: 1rem;
      font-family: inherit;
      background: rgba(26,26,26,0.5);
      color: var(--text);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .auth-card input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(139,111,175,0.2);
    }
    .auth-card input::placeholder {
      color: var(--text-muted);
    }
    .auth-btn {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: var(--primary-dark);
      border: none;
      border-radius: 10px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
      margin-top: 8px;
    }
    .auth-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(139,111,175,0.4);
    }
    .auth-error {
      display: none;
      background: rgba(231,76,60,0.1);
      border: 1px solid rgba(231,76,60,0.3);
      color: #e74c3c;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-bottom: 16px;
      text-align: center;
    }
    .auth-error.show {
      display: block;
    }
    .auth-success {
      display: none;
      background: rgba(46,204,113,0.1);
      border: 1px solid rgba(46,204,113,0.3);
      color: #2ecc71;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-bottom: 16px;
      text-align: center;
    }
    .auth-success.show {
      display: block;
    }
    .auth-back {
      display: block;
      text-align: center;
      margin-top: 24px;
      color: var(--text-light);
      font-size: 0.9rem;
    }
    .auth-back a {
      color: var(--accent);
      font-weight: 600;
    }
    .auth-back a:hover {
      text-decoration: underline;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-mark">ТТ</div>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchAuthTab('login')">Вход</button>
        <button class="auth-tab" onclick="switchAuthTab('register')">Регистрация</button>
      </div>

      <div class="auth-error" id="authError"></div>
      <div class="auth-success" id="authSuccess"></div>

      <!-- LOGIN FORM -->
      <form class="auth-form active" id="loginForm">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="mail@example.com" required>
        </div>
        <div class="form-group">
          <label for="loginPass">Пароль</label>
          <input type="password" id="loginPass" placeholder="Введите пароль" required>
        </div>
        <button type="submit" class="auth-btn">Войти</button>
      </form>

      <!-- REGISTER FORM -->
      <form class="auth-form" id="registerForm">
        <div class="form-row">
          <div class="form-group">
            <label for="regName">Имя *</label>
            <input type="text" id="regName" placeholder="Как вас зовут?" required>
          </div>
          <div class="form-group">
            <label for="regPhone">Телефон *</label>
            <input type="tel" id="regPhone" placeholder="+7 (___) ___-__-__" required>
          </div>
        </div>
        <div class="form-group">
          <label for="regEmail">Email *</label>
          <input type="email" id="regEmail" placeholder="mail@example.com" required>
        </div>
        <div class="form-group">
          <label for="regPass">Пароль *</label>
          <input type="password" id="regPass" placeholder="Минимум 6 символов" required minlength="6">
        </div>
        <div class="form-group">
          <label for="regPass2">Повторите пароль *</label>
          <input type="password" id="regPass2" placeholder="Ещё раз пароль" required>
        </div>
        <button type="submit" class="auth-btn">Зарегистрироваться</button>
      </form>

      <div class="auth-back">
        <a href="index.html">← Вернуться на сайт</a>
      </div>
    </div>
  </div>

  <script>
    function switchAuthTab(tab) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
      document.getElementById('authError').classList.remove('show');
      document.getElementById('authSuccess').classList.remove('show');

      if (tab === 'login') {
        document.querySelectorAll('.auth-tab')[0].classList.add('active');
        document.getElementById('loginForm').classList.add('active');
      } else {
        document.querySelectorAll('.auth-tab')[1].classList.add('active');
        document.getElementById('registerForm').classList.add('active');
      }
    }

    function getUsers() {
      return JSON.parse(localStorage.getItem('ttmebel_users') || '[]');
    }

    function saveUsers(users) {
      localStorage.setItem('ttmebel_users', JSON.stringify(users));
    }

    // REGISTER
    document.getElementById('registerForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const errorEl = document.getElementById('authError');
      const successEl = document.getElementById('authSuccess');

      const name = document.getElementById('regName').value.trim();
      const phone = document.getElementById('regPhone').value.trim();
      const email = document.getElementById('regEmail').value.trim().toLowerCase();
      const pass = document.getElementById('regPass').value;
      const pass2 = document.getElementById('regPass2').value;

      errorEl.classList.remove('show');
      successEl.classList.remove('show');

      if (pass !== pass2) {
        errorEl.textContent = 'Пароли не совпадают';
        errorEl.classList.add('show');
        return;
      }

      const users = getUsers();
      if (users.find(u => u.email === email)) {
        errorEl.textContent = 'Пользователь с таким email уже существует';
        errorEl.classList.add('show');
        return;
      }

      const user = {
        id: Date.now(),
        name,
        phone,
        email,
        password: btoa(pass),
        registeredAt: new Date().toISOString(),
        orders: []
      };

      users.push(user);
      saveUsers(users);

      successEl.textContent = 'Регистрация успешна! Теперь войдите.';
      successEl.classList.add('show');

      document.getElementById('registerForm').reset();
      setTimeout(() => switchAuthTab('login'), 1500);
    });

    // LOGIN
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const errorEl = document.getElementById('authError');

      const email = document.getElementById('loginEmail').value.trim().toLowerCase();
      const pass = document.getElementById('loginPass').value;

      errorEl.classList.remove('show');

      const users = getUsers();
      const user = users.find(u => u.email === email && atob(u.password) === pass);

      if (!user) {
        errorEl.textContent = 'Неверный email или пароль';
        errorEl.classList.add('show');
        return;
      }

      localStorage.setItem('ttmebel_current_user', JSON.stringify({
        id: user.id,
        name: user.name,
        email: user.email,
        phone: user.phone
      }));

      window.location.href = 'profile.html';
    });
  </script>
</body>
</html>
