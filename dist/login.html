<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Вход — ТТмебель</title><meta name="robots" content="noindex, nofollow"><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/style.css?v=3.1"><style> .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; } .login-card { background: rgba(37,37,37,0.6); backdrop-filter: blur(12px); border: 1px solid rgba(58,58,58,0.5); border-radius: 20px; padding: 48px 40px; max-width: 420px; width: 100%; box-shadow: 0 25px 80px rgba(0,0,0,0.5); position: relative; overflow: hidden; } .login-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, transparent, #c8a84e, transparent); } .login-logo { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 32px; } .login-logo .logo-mark { width: 56px; height: 56px; font-size: 1.6rem; } .login-title { text-align: center; margin-bottom: 8px; font-size: 1.6rem; font-weight: 800; } .login-subtitle { text-align: center; color: #a0a0a0; margin-bottom: 32px; font-size: 0.95rem; } .login-card .form-group { margin-bottom: 20px; } .login-card .form-group label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.9rem; color: #f0f0f0; } .login-card input { width: 100%; padding: 14px 16px; border: 2px solid rgba(58,58,58,0.5); border-radius: 10px; font-size: 1rem; font-family: inherit; background: rgba(26,26,26,0.5); color: #f0f0f0; transition: border-color 0.2s, box-shadow 0.2s; } .login-card input:focus { outline: none; border-color: #c8a84e; box-shadow: 0 0 0 3px rgba(200,168,78,0.2); } .login-card input::placeholder { color: #707070; } .login-btn { width: 100%; padding: 16px; background: #c8a84e; color: #1a1a1a; border: none; border-radius: 10px; font-size: 1.05rem; font-weight: 700; cursor: pointer; transition: all 0.3s; font-family: inherit; margin-top: 8px; } .login-btn:hover { background: #9d7dbf; transform: translateY(-2px); box-shadow: 0 4px 20px rgba(200,168,78,0.4); } .login-error { display: none; background: rgba(231,76,60,0.1); border: 1px solid rgba(231,76,60,0.3); color: #e74c3c; padding: 12px 16px; border-radius: 8px; font-size: 0.9rem; margin-bottom: 16px; text-align: center; } .login-error.show { display: block; } .login-back { display: block; text-align: center; margin-top: 24px; color: #a0a0a0; font-size: 0.9rem; } .login-back a { color: #c8a84e; font-weight: 600; } .login-back a:hover { text-decoration: underline; } </style></head><body><div class="login-wrap"><div class="login-card"><div class="login-logo"><div class="logo-mark">ТТ</div></div><h1 class="login-title">Вход в панель</h1><p class="login-subtitle">Введите логин и пароль администратора</p><div class="login-error" id="loginError">Неверный логин или пароль</div><form id="loginForm"><div class="form-group"><label for="login">Логин</label><input type="text" id="login" name="login" placeholder="Введите логин" required autocomplete="username"></div><div class="form-group"><label for="password">Пароль</label><input type="password" id="password" name="password" placeholder="Введите пароль" required autocomplete="current-password"></div><button type="submit" class="login-btn">Войти</button></form><div class="login-back"><a href="index.html">← Вернуться на сайт</a></div></div></div><script> async function sha256(message) { const msgBuffer = new TextEncoder().encode(message); const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer); const hashArray = Array.from(new Uint8Array(hashBuffer)); return hashArray.map(b => b.toString(16).padStart(2, '0')).join(''); } document.getElementById('loginForm').addEventListener('submit', async function(e) { e.preventDefault(); const login = document.getElementById('login').value; const password = document.getElementById('password').value; const errorEl = document.getElementById('loginError'); const hash = await sha256(password); if (login === 'admin' && hash === '4023b184a30ecc2462803d594228b8169bde21354c3305c54fae3b5cf57d3134') { localStorage.setItem('ttmebel_admin_hash', hash); localStorage.setItem('ttmebel_admin', 'true'); window.location.href = 'admin.html'; } else { errorEl.classList.add('show'); document.getElementById('password').value = ''; } }); </script></body></html>
